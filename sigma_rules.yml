title: Proxy or Firewall - freeipapi.com abuse for victim geolocation
id: 2b4d9f6a-3c7e-031f-4a5b-6c7d8e9f0a1b
status: experimental
description: |
  Sample called https://freeipapi.com/api/json before exfiltration.
  Alone this is weak; combine with other HyperHives indicators.
license: MIT
author: Independent malware analysis repository
date: 2026-04-06
references:
  - see repository README
logsource:
  category: proxy
  product: any
detection:
  selection:
    cs-host|contains: 'freeipapi.com'
    cs-uri|contains: '/api/json'
  condition: selection
falsepositives:
  - Legitimate use of freeipapi by other software
level: low
tags:
  - attack.discovery
  - attack.t1016
