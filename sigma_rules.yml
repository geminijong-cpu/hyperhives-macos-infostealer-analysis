title: Network - HTTPS to cloudproxy.link C2
id: 7c9e4a1b-8d2f-5e6a-9b0c-1d2e3f4a5b6c
status: experimental
description: |
  Detects HTTP/S requests to cloudproxy.link — primary C2 domain for HyperHives macOS
  infostealer (paths /m/opened, /m/metrics, /m/decode, /db/debug per static analysis).
license: MIT
author: Independent malware analysis repository
date: 2026-04-06
references:
  - see repository README
logsource:
  category: proxy
  product: any
detection:
  selection:
    cs-host|contains: 'cloudproxy.link'
  condition: selection
fields:
  - cs-host
  - cs-uri
  - cs-method
falsepositives:
  - Unknown; domain may be sinkholed or repurposed after disclosure
level: high
tags:
  - attack.command_and_control
  - attack.t1071.001
  - attack.t1041

